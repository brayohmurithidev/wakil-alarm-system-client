server {
    listen 80;
    listen [::]:80;
    server_name admin-wakil-alarm.fazilabs.com;

    root /home/dev/app/wakil-alarm-frontend/dist;
    index index.html;

    # React Router client-side routing — same rule as vercel.json's
    # catch-all rewrite, otherwise refreshing on a deep route 404s.
    location / {
        try_files $uri /index.html;
    }

    # Vite content-hashes filenames under /assets, so these are safe to
    # cache forever — a new deploy ships new filenames.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
