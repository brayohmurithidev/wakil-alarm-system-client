name: Staging Deploy

on:
  push:
    branches: [brian-staging]

jobs:
  build-deploy:
    name: Build & deploy to staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging mode)
        run: npm run build:staging

      - name: Archive build
        run: tar -czf dist.tar.gz -C dist .

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: dist.tar.gz
          target: ${{ vars.STAGING_FRONTEND_PATH || '/home/dev/app/wakil-alarm-frontend' }}

      - name: Extract and swap in atomically
        uses: appleboy/ssh-action@v1.0.3
        env:
          STAGING_FRONTEND_PATH: ${{ vars.STAGING_FRONTEND_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_FRONTEND_PATH
          script: |
            set -e

            APP_PATH="${STAGING_FRONTEND_PATH:-/home/dev/app/wakil-alarm-frontend}"
            cd "$APP_PATH"

            # Extract into a fresh dir, then swap via mv (atomic rename) so
            # nginx never serves a half-extracted dist/.
            rm -rf dist_new
            mkdir dist_new
            tar -xzf dist.tar.gz -C dist_new

            rm -rf dist_old
            if [ -d dist ]; then mv dist dist_old; fi
            mv dist_new dist
            rm -rf dist_old dist.tar.gz
